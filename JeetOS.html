function getStreakData() {
    // Read live data from store at notification time
    const W = store.get("jos_history") || [];
    const rev = [...W].reverse();
    // Overall streak
    let streak = 0;
    for (const d of rev) {
        if (d.savedAt)
            streak++;
        else
            break;
    }
    // Gym streak
    let gymStreak = 0;
    for (const d of rev) {
        if (d.gymDone)
            gymStreak++;
        else
            break;
    }
    // Skin streak
    let skinStreak = 0;
    for (const d of rev) {
        if (d.skincareDone)
            skinStreak++;
        else
            break;
    }
    // Sleep streak
    let sleepStreak = 0;
    for (const d of rev) {
        if ((d.sleepHours || 0) >= 7)
            sleepStreak++;
        else
            break;
    }
    // Yesterday vs 2 days ago score (simple)
    const yd = W.length >= 1 ? W[W.length - 1] : null;
    const yd2 = W.length >= 2 ? W[W.length - 2] : null;
    const ydScore = yd ? (yd.gymDone ? 25 : 0) + (yd.skincareDone ? 20 : 0) + ((yd.sleepHours || 0) >= 7 ? 20 : 0) + Math.min(25, (yd.totalProtein || 0) / 170 * 25) + 10 : 0;
    const yd2Score = yd2 ? (yd2.gymDone ? 25 : 0) + (yd2.skincareDone ? 20 : 0) + ((yd2.sleepHours || 0) >= 7 ? 20 : 0) + Math.min(25, (yd2.totalProtein || 0) / 170 * 25) + 10 : 0;

    // Week stats
    const w7 = W.slice(-7);
    const gymDays7 = w7.filter(d => d.gymDone).length;
    const toGo = Math.max(0, 6 - gymDays7); // target 6/7
    return { streak, gymStreak, skinStreak, sleepStreak, gymDays7, toGo, scoreDiff, ydScore: Math.round(ydScore) };
}

function scheduleAllNotifs() {

            return;
        const timeStr = customTimes[n.id] || n.time;

        _notifTimers[n.id] = setTimeout(() => {

            // Late warning — 30 min after
            _notifTimers[n.id + "_late"] = setTimeout(() => fireNotif(n.id + "_late", "⚠️ " + n.label + " — Late", n.msgs, "late"), 1800000);

            { k: ["push day", "push workout", "chest shoulder"], a: "Push Day (Mon+Thu) — 7 exercises: 1) Bench Press — bar to nipple line, 45deg elbows, 3sec down, no lockout. Hits Mid+Lower chest. 2) Chest Dip — 45deg forward lean, wide grip. Lower chest. 3) Low Cable Fly — scoop floor to collarbone, 2sec squeeze. Upper chest. 4) Butterfly/Pec Deck — seat at nipple height, drive elbows. Inner chest. 5) Lateral Raise — slight forward lean, drive elbows to shoulder height. Side delts. 6) Shoulder Press — 75deg bench, elbows 30-45deg forward. Front+Side delts. 7) Face Pull — pull to nose, split rope. Rear delts. All 3 sets x 12-15 reps." },
            { k: ["pull day", "pull workout", "back bicep"], a: "Pull Day (Tue+Fri) — 8 exercises: 1) Bent Over Row — pull to belly button, 45-75deg torso. Mid+Upper back thickness. 2) Lat Pulldown — thumbless grip, drive elbows DOWN and BACK to collarbone. V-taper width. 3) Seated Cable Row — belly button pull, squeeze shoulder blades 2sec. Mid back depth. 4) Back Extension — hips at pivot, glute squeeze, straight line. Lower back. 5) Shrug — straight up no rolling, hold 2sec. Upper traps. 6) Preacher Curl — armpits locked, stop before vertical. Short head peak. 7) Cable Curl — elbows glued to ribs, squeeze at top. Overall mass. 8) Hammer Curl — neutral grip, elbows back. Brachialis + forearm thickness." },
            { k: ["legs day", "legs workout", "quad hamstring"], a: "Legs Day (Wed+Sat) — 8 exercises: 1) Leg Press — shoulder width middle, no butt wink, NEVER lock knees. VL+Glutes. 2) Bulgarian Split Squat — 80% weight front foot, drop back knee straight down. RF+Glutes. 3) Leg Extension — toes pulled up, 2sec hold at top. VMO teardrop. 4) Seated Leg Curl — thigh pad locked, heels pull, 2sec at bottom. Hamstrings. 5) Seated Calf Raise — full stretch at bottom 2sec, squeeze at top 2sec. Soleus. 6) Rope Pushdown — elbows glued, split rope. Lateral head. 7) Cable Extension overhead — elbows by ears. Long head. 8) Cable Kickback — full extension, 2sec squeeze. All 3 heads." },
            { k: ["chest", "upper chest", "lower chest", "inner chest"], a: "Chest breakdown: Upper chest = Low Cable Fly (scoop from floor to collarbone). Mid chest = Bench Press (nipple line touch). Lower chest = Chest Dip (45deg lean forward) + Bench Press. Inner chest = Butterfly/Pec Deck (drive elbows together). For more upper chest emphasis: keep cable pulleys at lowest point and drive up to collarbone — many people stop at chest level which defeats the purpose." },
            { k: ["back", "lats", "v taper", "wings", "thickness"], a: "Back breakdown: V-taper/width = Lat Pulldown (thumbless grip, drive elbows DOWN not pull with hands). Thickness = Bent Over Row (pull to belly button not chest). Mid back detail = Seated Cable Row (squeeze shoulder blades like cracking a walnut). Lower back foundation = Back Extension (never hyperextend — straight line only). Upper traps = Shrug (straight up, 2sec hold, no rolling)." },
            { k: ["shoulders", "delt", "shoulder press", "lateral raise", "face pull"], a: "Shoulder breakdown: Side delt (width) = Lateral Raise — slight lean forward, drive ELBOWS not hands, stop exactly at shoulder height, never above. Front+Side delt = Shoulder Press — 75deg bench (not 90, saves spine), elbows 30-45deg forward (scapular plane). Rear delt (posture) = Face Pull — cable at eye level, pull to nose, split rope apart, squeeze 2sec. Rear delt is most neglected — your face pull habit is premium." },
            { k: ["bicep", "biceps", "arms", "curl"], a: "Bicep breakdown: Short head peak = Preacher Curl — armpits locked to pad, stop BEFORE vertical (past vertical = zero tension). Long head + mass = Cable Curl — elbows GLUED to ribs (if elbows swing forward, load shifts to shoulders, not biceps). Brachialis + forearm thickness = Hammer Curl — neutral grip, elbows back. For bigger arms: brachialis growth pushes bicep up visually — hammer curls are underrated." },
            { k: ["tricep", "triceps", "pushdown", "extension"], a: "Tricep breakdown: Lateral head (side thickness visible from front) = Rope Pushdown — elbows glued, SPLIT rope at bottom making V shape, 2sec squeeze. Long head (bulk, visible from behind, fills sleeve) = Overhead Extension — elbows by ears pointing UP, full stretch behind head. All 3 heads (definition) = Kickback — elbow locked at hip, full extension, 2sec squeeze. Long head only trains fully when arm is overhead." },
            { k: ["legs", "quads", "hamstrings", "calves", "glutes"], a: "Legs breakdown: Quad mass = Leg Press + Bulgarian Split Squat. VMO teardrop = Leg Extension with toes pulled toward shin (dorsiflexion activates VMO 2x). Hamstrings = Seated Leg Curl — thigh pad locked, 2sec peak squeeze when fully flexed. Calves = Seated Calf Raise — full 2sec stretch at bottom (most people skip this), full 2sec squeeze at top. Glutes = high foot placement on leg press + full depth split squat." },
            { k: ["cardio", "treadmill", "incline walk", "liss"], a: "Cardio protocol: After ALL strength exercises, take Creatine 5g, then 30 min treadmill. Settings: Incline 10, Speed 4.5. This is LISS (Low Intensity Steady State) — fat burn zone (65-70% max HR), doesn't impair recovery. Non-negotiable even on tired days. Benefits: fat oxidation, heart health, blood flow to muscles for recovery, clears lactic acid from workout." },
            { k: ["creatine", "creatine timing"], a: "Creatine 5g daily. Timing: post-workout before cardio. No loading phase needed. How it works: creatine phosphate system fuels explosive reps (the hardest 12-15 reps), increases water in muscle cells (fullness), allows 1-2 extra reps per set, 3-5% strength increase over 4 weeks. Take daily even on rest days (consistency matters). Takes 2-3 weeks to saturate muscles." },
            { k: ["form", "technique", "how to", "execution"], a: "Universal form rules: 3-second eccentric (lowering) on every exercise — this is where most muscle damage and growth happens. 1-2 second squeeze at peak contraction. Control both directions. For chest: elbows 45deg not 90. For pulling: drive elbows not hands. For curls: elbows glued. For shoulder: stay in scapular plane (30-45deg forward). Ego check: reduce weight and perfect form before adding weight." },
            { k: ["plateau", "stuck", "not progressing", "same weight", "no gains"], a: "Plateau protocol: 1) Add 2.5kg to main lifts (not all at once — pick 1 exercise). 2) Add 1 rep per set before adding weight. 3) Reduce rest periods by 15 seconds. 4) Slow eccentric to 4 seconds (more time under tension). 5) Swap to alt exercise for 3 weeks (new stimulus). 6) Deload week — 60% weight, 3 sets only (allows full recovery). 7) Check sleep and protein — plateau often means recovery deficit not training issue." },
            { k: ["rest day", "recovery", "off day"], a: "Rest day = training day for muscles. Muscle protein synthesis runs 24-48 hours post-workout — growth happens NOW not during the workout. Your job today: hit 170g protein (most important), 4.5L water, 7-8h sleep tonight, light walk if you want. Don't skip eating because you're not training — muscle needs building blocks. Your supplements still matter: Morning drink, Brahmi+B12, 11PM stack." },
            { k: ["sore", "doms", "soreness", "muscle pain"], a: "DOMS (delayed onset muscle soreness) 24-48h after training = normal sign of muscle damage = growth signal. Train through it — don't skip next session. Sharp pain DURING exercise = stop immediately. Joint pain = form issue or too heavy, reduce weight. Your Magnesium Glycinate at 11PM reduces overnight soreness. Ashwagandha reduces inflammation. Active recovery: light walk, stretch. Don't ice — it reduces the inflammation that triggers growth." },
            { k: ["fat loss", "weight loss", "lean", "cut", "shred"], a: "Fat loss while maintaining muscle: slight caloric deficit (1600 kcal vs your 1800), maintain 170g protein strictly (prevents muscle loss in deficit), keep all compound lifts heavy (muscle is metabolically expensive — body burns it only if you stop using it), 30 min LISS cardio daily (fat oxidation), adequate sleep (cortisol from poor sleep = fat storage especially belly). Don't drop below 1600 — accelerates muscle loss." },
            { k: ["muscle", "gain", "bulk", "mass", "size"], a: "Muscle gain fundamentals: Progressive overload every week (add weight or reps — this is the ONLY variable that matters long term). 170g protein daily (2g per kg bodyweight minimum). Caloric surplus of 200-300 kcal (not too aggressive — excess calories = fat, not muscle). Sleep 7-8h (80% of growth hormone released during deep sleep). Creatine 5g daily. Consistency over 6+ months minimum to see significant changes." },
        ],
        def: "Push Mon+Thu, Pull Tue+Fri, Legs Wed+Sat, Rest Sun. 3 sets x 12-15 reps. 3sec descent always. Progressive overload weekly. 170g protein, 7-8h sleep. Ask me about any exercise, muscle group or training concept.",
    },
    // ─── NUTRITION COACH ─────────────────────────────────────────────────────
    nutrition: {
        q: [
            { k: ["protein", "how much protein", "hit protein", "protein target"], a: "Daily target: 170g. Your three anchors: Seitan breakfast 38g + Paneer Paratha lunch 42g + Soya Chunks dinner 32g = 112g from main meals. Remaining 58g: Whey protein 1 scoop = 24g, Hung curd 100g = 11g, Protein bar = 24g, Badam+walnuts = 5-6g. Log meals in Diet tab — it tracks live protein. On gym days post-workout window is critical — get 30-40g within 30 min of workout." },
            { k: ["seitan", "seitan recipe", "how to make seitan", "wheat gluten"], a: "Seitan recipe: 50g dry VWG + 1/4 tsp baking powder + 100-120ml lukewarm water. Knead 60 seconds ONLY — over-kneading = rubbery texture. Rest covered 5 min (gluten relaxes). Cut into bite-size cubes. Simmer in garlic water (2 cloves + 400ml water) on LOW flame 10 min — bubbles but no hard boil (hard boil = tough). Drain. Immediately coat warm seitan in marinade: 30g hung curd + kashmiri mirch + chaat masala + kasuri methi + salt. Dry sear on VERY hot pan 60 sec per side — no oil. The curd marinade creates a crust. Result: 38g protein, 185 kcal." },
            { k: ["paneer", "paneer paratha", "paratha"], a: "Paneer Paratha recipe: Make paneer — boil 300ml skim milk + 32g skim milk powder, at boiling add 1 tbsp vinegar, stir slowly, white curds form. Strain through muslin, squeeze VERY dry (wet paneer = soggy paratha). Dough: 75g HP flour + pinch ajwain + 30g hung curd + warm whey water (from paneer straining — don't waste it). Knead to soft pliable dough, rest 10 min covered. Roll out, add crumbled spiced paneer filling, seal, roll gently. Cook on BLAZING hot tawa dry — press edges firmly, it will puff. Charred golden both sides. 42g protein per serving." },
            { k: ["soya", "soya chunks", "soya recipe"], a: "Soya Chunks recipe: 60g dry chunks into rapidly boiling water 5-7 min. Drain, cold water rinse (stops cooking). Squeeze COMPLETELY dry — this is the most important step, wet chunks steam instead of sear. Marinate 10 min: ginger-garlic paste + lal mirch + haldi + jeera + lemon squeeze + crushed dry soya powder (makes coating stick). Sear on MAXIMUM heat pan with zero oil — wait for charred spots before flipping. When masala starts sticking, deglaze with 1 tbsp water, toss to coat. 32g protein, 222 kcal." },
            { k: ["glow juice", "post gym juice", "recovery drink", "juice recipe"], a: "Glow Juice recipe: Base — 1/2 Anaar + ice + cold water in blender. Add: 2 Gajar + 1/2 Beetroot (nitric oxide, boosts blood flow for recovery). 1 Bada Tomato + 1/2 Cucumber (lycopene, skin hydration). Small Papaya piece (papain enzyme for digestion). 30ml Amla + 30ml Aloe Vera juice (Vitamin C, gut healing). 1/2 inch Adrak + 10-12 Pudina leaves (anti-inflammatory). Season: 1/2 tsp Jeera powder + 1 Nimbu + pinch Chaat Masala. Drink within 2 minutes of getting home post-gym. The 2-min rule matters — oxidation degrades nutrients fast." },
            { k: ["morning drink", "morning routine", "first drink"], a: "Morning Drink recipe: 200-250ml warm water base. Add in order: Flax seeds + VCO 1/2 tsp + Shilajit rice-grain size + Lion's Mane 1/2 tsp + Haldi 1/4 tsp + Kali Mirch 1 pinch (activates turmeric 2000%) + Dalchini 1/4 tsp + Pink Salt pinch + 5-10 Lemon drops + 1/2 tsp Ginger juice. Stir well, drink immediately while warm. This activates metabolism, reduces inflammation, feeds brain (Lion's Mane), supports liver (Shilajit). Don't substitute with cold water — warm is intentional for absorption." },
            { k: ["alpha drink", "night drink", "isabgol"], a: "Alpha Drink varies by day: Mon/Wed/Fri: Isabgol + ACV + Moringa + Rose Petal + Dry Coco + Kesar + Pink Salt + Daruharidra + Neem. Tue/Thu/Sat: Same minus ACV+Neem, add Multehi instead. Sunday: Isabgol only. Core ingredient Isabgol = psyllium husk — feeds gut bacteria, cleanses colon overnight, regulates blood sugar. ACV on alternating days — more than 3 days/week can damage tooth enamel and esophagus." },
            { k: ["protein bar", "homemade bar", "energy bar"], a: "Homemade Protein Bar (batch of 4): 4 scoops Whey protein + 120g Oats + 2 tbsp Peanut Butter + mixed seeds (sunflower, pumpkin, chia) + Stevia to taste + minimal water to bind. Mix, press into mold or tray, refrigerate 2 hours. Each bar: 24g protein, 150 kcal. Make Sunday batch for the week. Eat at 5:30 PM slot with coffee and L-Theanine." },
            { k: ["calories", "1800", "calorie", "kcal"], a: "Your 1800 kcal distribution: Seitan 185 + Paneer Paratha ~380 + Soya 222 = 787 from main meals. Glow Juice ~120. Protein bar 150. Morning drink ~45. Badam/walnuts ~70. Supplements negligible. Total ~1172 from tracked sources. Remaining ~628 from hung curd, additional snacks, cooking variations. Diet tab tracks this live — log custom foods to stay accurate." },
            { k: ["post workout", "after gym", "after workout", "recovery meal"], a: "Post-workout sequence matters: 1) Glow Juice immediately (within 2 min home) — fast micronutrients, antioxidants. 2) Badam/Walnuts 2 min later — healthy fats, slow the next meal digestion. 3) Seitan breakfast within 30 min — 38g protein for muscle protein synthesis. The anabolic window is real but wider than 30 min — aim for within 1-2 hours. Never skip post-workout meal thinking you'll eat less." },
            { k: ["cheat", "cheat meal", "junk", "pizza", "burger", "biryani"], a: "Cheat meal framework: Maximum 1 per week. Keep protein high even in cheat meal (add a protein source). Log it in Diet tab custom food log — awareness without guilt. Don't skip gym next day out of guilt — training is the response. Resume normal routine immediately at next meal. 1 cheat meal doesn't undo progress; however 1 cheat meal becoming 3 days does. Plan it on a rest day preferably." },
        ],
        def: "Your nutrition targets: 1800 kcal, 170g protein, 4.5L water. Three protein anchors: Seitan (38g), Paneer Paratha (42g), Soya Chunks (32g) = 112g base. Ask me about any recipe, supplement timing, or nutrition question.",
    },
    // ─── SLEEP COACH ─────────────────────────────────────────────────────────
    sleep: {
        q: [
            { k: ["why tired", "so tired", "exhausted", "fatigue", "low energy", "sleepy"], a: "Tiredness diagnosis checklist: 1) Sleep hours — was it 7+? 2) Sleep quality — deep or fragmented? 3) Last caffeine — was it before 5:30 PM? Caffeine half-life 6h means 7 PM coffee = still 50% active at 1 AM. 4) Blue light — screens within 1h of sleep block melatonin. 5) Meals before bed — heavy dinner less than 2h before sleep disrupts deep sleep. 6) Hydration — even mild dehydration causes fatigue. Your 11 PM stack is correct but environment matters." },
            { k: ["magnesium", "magnesium glycinate", "mg"], a: "Magnesium Glycinate at 11 PM — glycinate form specifically chosen for best bioavailability and sleep benefits (not oxide which mostly causes diarrhea). Activates GABA receptors (natural relaxation neurotransmitter), reduces cortisol, promotes deep NREM sleep, relaxes muscles (especially after heavy training). Takes 2-3 weeks of consistent use for full effect. Don't skip on rest days — sleep quality benefits are cumulative." },
            { k: ["ashwagandha", "ksm-66", "adaptogen"], a: "Ashwagandha (KSM-66) at 11 PM — reduces cortisol by 28-30% in clinical studies, balances HPA axis stress response, improves sleep quality score, aids muscle recovery by reducing inflammation. Works cumulatively over 4-8 weeks. Side effects: some people experience vivid dreams (normal) or slight nausea if taken on empty stomach. Take after Alpha Drink. Don't stop during exams or stressful periods — that's exactly when you need it most." },
            { k: ["shankhpushpi", "brahmi sleep"], a: "Shankhpushpi at 11 PM — Ayurvedic medhya rasayana (brain tonic). Calms overactive thoughts that prevent sleep, supports GABA production (natural relaxant), improves memory consolidation during REM sleep. This is why you include it: your mind tends to be active at night. It works best when taken consistently for 4+ weeks. Also in your morning stack as Brahmi — double brain support." },
            { k: ["caffeine", "coffee timing", "last coffee"], a: "Caffeine pharmacology: half-life 6 hours. Your schedule: Pre-gym coffee + 5:30 PM L-Theanine+Coffee. 5:30 PM means half-life clears by 11:30 PM = aligned with your 11 PM sleep target. Never drink coffee after 5:30 PM. The L-Theanine pairs with caffeine to smooth the effect AND extends the window slightly by reducing anxiety (anxiety = more cortisol = disrupted sleep). Perfect strategy." },
            { k: ["sleep stack", "night supplements", "before sleep"], a: "Your 11 PM stack is optimized: Magnesium Glycinate (GABA activation, muscle relax) + Ashwagandha (cortisol reduction, recovery) + Shankhpushpi (mind calming, memory consolidation). Take together 30-45 min before actual sleep time. Enhance with: 18-19°C room temperature (core body temperature must drop for deep sleep), complete darkness (even small light = melatonin disruption), no screens 60 min before. Alpha Drink with Isabgol at same time supports gut-brain axis for better sleep." },
            { k: ["deep sleep", "quality", "rem", "sleep quality"], a: "Deep sleep optimization: 1) Consistent bedtime — your circadian rhythm aligns after 2-3 weeks of same schedule, even weekends. 2) Your 11 PM stack directly increases deep NREM sleep (magnesium) and reduces cortisol (ashwagandha). 3) Training (which you do) increases slow-wave deep sleep. 4) Room temperature 18-20°C. 5) Last meal 2-3 hours before sleep. 6) No alcohol — destroys REM sleep architecture even in small amounts." },
            { k: ["nap", "power nap", "afternoon"], a: "Power nap protocol: 20 minutes, set alarm strictly. Between 1-3 PM only — aligns with natural post-lunch circadian dip. Beyond 20 min = enters deep sleep = sleep inertia (wake up groggy for 30 min). Never nap after 4 PM — reduces nighttime sleep pressure (adenosine buildup) making it harder to fall asleep. If you're consistently needing naps, prioritize adding 30 min to nighttime sleep." },
            { k: ["wake up", "morning", "fresh", "groggy", "alarm"], a: "Morning optimization: Don't hit snooze — multiple alarm cycles create sleep inertia. Set one alarm. When it rings: sit up immediately, morning drink within 5 min (warm water activates vagus nerve, reduces grogginess). Natural light exposure within 15 min of waking anchors circadian rhythm for the whole day. Your Morning Freshness score in Sleep Check-in tracks this — log it daily to see patterns." },
            { k: ["dream", "vivid dream", "nightmare", "dreaming"], a: "Vivid dreams from Ashwagandha — common and normal, especially in first 4-6 weeks. Ashwagandha can intensify dream vividness as it improves sleep architecture and REM quality. Solution: take it 2 hours before sleep instead of 30 min. Nightmares specifically: often linked to unprocessed stress. Your Shankhpushpi helps calm this. Deep sleep and vivid dreams are actually a sign your sleep architecture is improving." },
            { k: ["recover", "recovery", "sleep and training"], a: "Sleep is when training happens. During deep sleep: growth hormone released (peaks 10PM-2AM — another reason for 11 PM bedtime). Muscle protein synthesis continues. Neural motor patterns from gym get consolidated. Cortisol drops, allowing muscle repair. One night of 5h sleep reduces strength output by 10-15% next session. Chronic sleep debt = muscle loss + fat gain. Your 11 PM stack + 7-8h target is the formula." },
        ],
        def: "Your sleep protocol: 11 PM stack (Magnesium Glycinate + Ashwagandha + Shankhpushpi + Alpha Drink), same bedtime nightly, last caffeine 5:30 PM, no screens 1h before bed. 7-8h target. Ask me about any sleep concern.",

    // ─── STYLE COACH ─────────────────────────────────────────────────────────
    style: {
        q: [
            { k: ["what to wear", "what should i wear", "kya pehnu", "kya pehne", "kya pahnu", "kya pehna", "what to put on", "aaj kya"], a: "Quick formula based on context: Casual day — plain tee (white/black/grey) + dark jeans + clean white sneakers. Meeting/college — Oxford shirt tucked + chino + leather shoe. Gym — fitted tee + dark shorts/joggers + sneakers. Date — fitted jeans + plain tee or shirt + leather shoe. Tell me the occasion and I'll be specific." },
            { k: ["tshirt", "t-shirt", "tee", "which tshirt", "what tshirt", "plain tee"], a: "Tee guide: 3 core colors — white, black, charcoal grey. Fit: slightly fitted through chest and shoulders, NOT boxy or oversized — sleeve ends mid-bicep. Fabric: 180-220 GSM cotton holds shape better than thin tees. Avoid big logos/graphics for quiet luxury look. Pair with dark jeans + white sneakers for an instant clean fit. Round neck over V-neck for most builds." },
            { k: ["shirt", "oxford shirt", "which shirt", "formal shirt"], a: "Shirt guide: Start with white and light blue Oxford shirts — most versatile, work for office to dinner. Fit: shoulder seam exactly on shoulder bone, chest doesn't pull at buttons, sleeve ends at wrist bone. Tuck into chino or trouser for smart-casual. Roll sleeves to mid-forearm for relaxed look. Avoid busy patterns — solid or subtle texture only." },
            { k: ["jeans", "denim", "which jeans", "what jeans"], a: "Jeans guide: 2 essential pairs — dark indigo (most versatile, dresses up or down) and black (sleek, evening). Fit: slim straight, not skinny not baggy. Should break cleanly once at top of shoe — no stacking or bunching. No heavy distressing or fading for the quiet luxury aesthetic. Raw or dark wash denim looks most premium." },
            { k: ["pants", "trouser", "chino", "which pants"], a: "Bottoms guide: 1 beige/khaki chino is your most versatile piece — pairs with everything from tee to Oxford shirt. Fit: slim through thigh, slight taper, breaks once at shoe. Avoid pleats — flat front looks modern. Navy or grey chino as second option if building out further." },
            { k: ["jacket", "blazer", "outerwear", "which jacket"], a: "Outerwear guide: 1 navy blazer is the highest ROI piece — instantly elevates tee+jeans to smart-casual, or shirt+chino to business. Unstructured/soft shoulder blazers look more modern than heavily padded ones. For casual layering: a clean bomber or trucker jacket in neutral tone." },
            { k: ["watch", "accessory", "accessories", "jewelry"], a: "Accessories rule: Less is more. 1 watch — leather strap for versatility, steel for formal. Pick ONE metal tone (silver or gold) across watch, belt buckle, any rings — mixing looks cluttered. Skip statement jewelry. A clean watch is the single highest-impact accessory for a put-together look." },
            { k: ["capsule", "wardrobe", "what to buy", "essentials"], a: "Your capsule wardrobe (10 items = 50+ outfits): Tops: 3 premium plain tees (white, black, grey), 2 Oxford shirts (white, light blue), 1 navy/cream polo. Bottoms: 2 jeans (dark indigo, black), 1 beige/khaki chino. Shoes: 1 clean white sneaker, 1 brown leather shoe or clean white leather. Outerwear: 1 navy blazer. Buy quality not quantity. These neutrals mix with everything. Add 1-2 seasonal statement pieces." },
            { k: ["color", "colours", "matching", "palette", "what color"], a: "Your color palette: Build on neutrals — white, navy, black, beige/camel, grey. These mix with everything. Rules: Max 1 statement color per outfit. If shoes are bold, keep top and bottom neutral. Belt matches shoe tone (always). Accessories: pick ONE metal — silver or gold, not both. For Indian skin tone: earth tones (camel, olive, rust), deep colors (burgundy, forest green, navy) look excellent. Avoid neon and overly bright colors." },
            { k: ["quiet luxury", "aesthetic", "vibe", "style aesthetic"], a: "Quiet Luxury aesthetic: No visible logos, no graphics, elevated basics. Linen shirts in summer, heavy cotton in winter. Well-fitted trousers over jeans where possible. Clean sneakers or leather shoes only. Minimal accessories — one watch, one ring maximum. Think: if the brand name was removed, would the piece still look good? If yes — that's quiet luxury. Quality fabric choice matters most." },
            { k: ["casual", "everyday outfit", "daily outfit"], a: "Casual outfit formula: Base — plain tee (white/grey/black) or minimal print. Bottoms — dark jeans or chinos (no distressing). Shoes — clean white sneakers or simple canvas. Fit is everything: sleeves end at bicep, shoulder seam sits on shoulder bone, tee should be slightly slim not boxy, jeans break at top of shoe. This formula with good grooming = effortlessly sharp." },
            { k: ["formal", "office", "professional", "business"], a: "Smart-casual to formal: Oxford shirt tucked + chino/trousers + leather shoe. Add blazer for business. Colors: white or light blue shirt with navy or grey bottom. Shoes must be clean and polished. Belt matches shoe color. No tie unless required. Fit still matters more than brand — a well-fitted H&M blazer beats an ill-fitting designer one." },
            { k: ["gym style", "workout clothes", "gym outfit"], a: "Gym aesthetic: Dark fitted shorts or joggers + well-fitted tee (not oversized — you're building a physique, wear clothes that show it). Clean white or black sneakers. Minimal accessories. The fit of your gym clothes matters — this is where results are displayed. As your physique improves, fitted training gear becomes a statement." },
            { k: ["shoes", "footwear", "sneakers", "which shoes"], a: "Shoe hierarchy: 1 clean white leather sneaker (most versatile — pairs with everything from jeans to chinos). 1 brown leather Oxford or Derby shoe (formal to smart-casual). Optional: 1 white canvas sneaker or minimal colorway. Keep white shoes clean — dirty white shoes kill an outfit. Polish leather shoes monthly. 3 shoes = complete wardrobe coverage." },
            { k: ["fit", "fitting", "size", "tailoring"], a: "Fit is the #1 factor in style — more than brand, price, or trend. Key fits: Shoulders seam sits exactly on shoulder bone (not drooping). Chest fits without pulling buttons. Sleeves end at base of thumb (shirt), mid-bicep (tee). Jeans should break cleanly at top of shoe with no bunching. Chinos: slim through thigh, tapered slightly. When in doubt — go one size smaller, it's usually right." },
            { k: ["occasion", "date", "wedding", "party", "event"], a: "Occasion dressing: Date — fitted jeans + plain tee/shirt + leather shoe + light fragrance. Wedding (Indian) — kurta or Indo-western with fitted churidar, well-fitted sherwani if guest. Party — dark jeans + textured/patterned shirt + leather shoe. Business meeting — chino + Oxford + blazer + leather shoe. Rule: always overdress slightly for first impressions. You can always remove the blazer." },
        ],
        def: "Style philosophy: Fit over brand. Quiet luxury over logos. Neutral palette base. 10-item capsule wardrobe. Grooming completes the look. Ask me about outfits, colors, or any style question.",
    },
    // ─── GROOMING COACH ──────────────────────────────────────────────────────
    grooming: {
        q: [
            { k: ["beard", "beard care", "beard oil", "beard trim"], a: "Beard routine: After shower on DAMP beard (not wet, not dry — damp = open cuticle, absorbs oil). 2-3 drops beard oil (jojoba-based best for skin). Comb through with beard comb from neck upward. Neckline is everything — trim 2 finger widths above Adam's apple. Cheek line follows natural growth (don't shave too high). Monthly: full cleanup at barber for definition. Weekly: neckline maintenance yourself." },
            { k: ["haircut", "trim", "barber", "cut"], a: "Haircut frequency: 3-4 weeks for sharp maintained look. 6-8 weeks if growing out (just trim split ends). Before your barber visit: do Sunday hair ritual 1-2 days before for best texture. Communicate clearly: bring reference photo. Your face shape determines best style — ask barber to recommend. After cut: your Argan+Arata routine maintains style between cuts." },
            { k: ["nail", "nails", "nail care", "trimming nails"], a: "Nail care routine: Check weekly (Sunday hygiene checklist). Trim when white tip exceeds 1-2mm. File rough edges after trimming — prevents snagging. Clean under nails daily (most people miss this — bacteria collect here). Cuticles: push back gently with warm water after shower, never cut (cutting causes infection). Clean nails are noticed — dirty nails immediately undercut any outfit." },
